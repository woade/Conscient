<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSCIENT — All</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:rgba(0,0,0,.81);
  --ink-solid:#0a0a0a;
  --muted:rgba(0,0,0,.5);
  --dim:rgba(0,0,0,.3);
  --line:rgba(0,0,0,.08);
  --bg:#ffffff;
  --grey:#f4f4f4;
  --grey2:#ececec;
  --sans:'Akkurat','Helvetica Neue',Helvetica,Arial,sans-serif;
  --sans-light:'Akkurat Light','Helvetica Neue',Helvetica,Arial,sans-serif;
}
html{-webkit-text-size-adjust:100%;}
body{font-family:var(--sans-light);color:var(--ink);background:var(--bg);line-height:1.6;font-size:12px;font-weight:400;}
a{color:inherit;text-decoration:none;}
ul{list-style:none;}
button{font-family:inherit;background:none;border:none;cursor:pointer;color:inherit;}
input[type="checkbox"]{accent-color:var(--ink-solid);}

/* PROMO BAR */
.promo-bar{background:#fff;text-align:center;padding:.7rem 1rem;font-size:.72rem;font-weight:700;letter-spacing:.02em;border-bottom:1px solid var(--line);}

/* NAV */
nav.site-nav{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 2rem;height:70px;border-bottom:1px solid var(--line);}
.nav-left{display:flex;gap:1.7rem;align-items:center;}
.nav-left a{font-size:.75rem;font-weight:400;letter-spacing:normal;color:rgba(0,0,0,.7);display:flex;align-items:center;gap:.25rem;white-space:nowrap;}
.nav-left a:hover{color:var(--ink-solid);}
.nav-left sup{font-size:.55rem;color:inherit;font-weight:500;top:-.5em;text-transform:uppercase;}
.nav-logo{font-family:var(--sans);font-size:1.5rem;font-weight:700;letter-spacing:normal;text-align:center;text-transform:uppercase;}
.nav-right{display:flex;justify-content:flex-end;align-items:center;gap:1.5rem;}
.nav-right .curr{font-size:.85rem;font-weight:400;display:flex;align-items:center;gap:.3rem;cursor:pointer;}
.nav-icon{width:19px;height:19px;display:inline-flex;cursor:pointer;position:relative;}
.nav-icon svg{width:100%;height:100%;stroke:var(--ink);fill:none;stroke-width:1.4;}
.bag-count{position:absolute;top:-7px;right:-9px;background:var(--ink);color:#fff;font-size:.55rem;font-weight:700;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
@media (max-width:900px){.nav-left{display:none;}}

/* TOAST */
.toast{position:fixed;top:78px;right:2rem;background:var(--ink);color:#fff;font-size:.72rem;letter-spacing:.03em;padding:.65rem 1.1rem;border-radius:2px;opacity:0;transform:translateY(-6px);transition:opacity .25s,transform .25s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateY(0);}

/* PAGE HEAD */
.page-head{padding:2.2rem 2rem .6rem;}
.page-head h1{font-size:1.25rem;font-weight:700;letter-spacing:normal;text-transform:uppercase;}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 2rem;flex-wrap:wrap;gap:1rem;border-bottom:1px solid var(--line);position:relative;}
.filter-left{display:flex;gap:1.75rem;flex-wrap:wrap;position:relative;}
.filter-btn{display:flex;align-items:center;gap:.4rem;font-size:.8rem;font-weight:400;padding:.5rem 0;border:none;background:none;color:var(--ink);}
.filter-btn:hover,.filter-btn.active{color:var(--ink-solid);}
.chev{flex-shrink:0;stroke:rgba(0,0,0,.45);transition:transform .15s;position:relative;top:1px;}
.filter-btn:hover .chev,.filter-btn.active .chev{stroke:var(--ink-solid);}
.filter-btn.active .chev{transform:rotate(180deg);}
.filter-panel{position:absolute;top:calc(100% + .5rem);left:0;background:#fff;border:1px solid var(--line);border-radius:2px;box-shadow:0 8px 24px rgba(0,0,0,.08);padding:1rem 1.2rem;min-width:210px;display:none;z-index:60;}
.filter-panel.open{display:block;}
.filter-panel label{display:flex;align-items:center;gap:.55rem;font-size:.75rem;padding:.35rem 0;cursor:pointer;}
.filter-panel .clear-link{display:block;margin-top:.6rem;font-size:.72rem;color:var(--muted);text-decoration:underline;cursor:pointer;}
.filter-right{display:flex;align-items:center;gap:1.6rem;}
.item-count{font-size:.8rem;color:var(--muted);}
.sort-wrap .filter-btn{padding:.5rem 0;}
.view-toggle{display:flex;gap:.3rem;}
.view-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:1px solid transparent;border-radius:4px;}
.view-btn.active{background:var(--grey);}
.view-btn svg{width:15px;height:15px;}
.view-btn svg rect,.view-btn svg circle{fill:var(--ink);}
.clear-all{font-size:.72rem;color:var(--muted);text-decoration:underline;cursor:pointer;margin-left:.5rem;}

/* PRODUCT GRID */
.product-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px 1.4rem;padding:1.4rem 2rem 0;}
.product-card{position:relative;}
.card-media{position:relative;aspect-ratio:3/4;overflow:hidden;background:var(--grey);cursor:pointer;}
.media-layer{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transition:opacity .35s;}
.media-layer.alt{opacity:0;}
.card-media:hover .media-layer.base{opacity:0;}
.card-media:hover .media-layer.alt{opacity:1;}
.media-mono{font-size:3.6rem;font-weight:700;letter-spacing:-.03em;color:rgba(0,0,0,.14);}
.badge{position:absolute;top:.7rem;left:.7rem;font-size:.5rem;font-weight:500;letter-spacing:normal;text-transform:uppercase;color:var(--ink);z-index:2;background:none;padding:0;}
.badge.sale{color:#b3261e;}
.quick-add{position:absolute;top:.7rem;right:.7rem;font-size:.75rem;font-weight:400;letter-spacing:normal;text-transform:none;background:none;color:var(--ink);padding:0;border-radius:0;opacity:0;transition:opacity .2s;z-index:2;}
.card-media:hover .quick-add{opacity:1;}
.size-row{position:absolute;left:0;right:0;bottom:0;display:flex;gap:.3rem;padding:.6rem;background:linear-gradient(to top,rgba(255,255,255,.96),rgba(255,255,255,0));opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;z-index:2;flex-wrap:wrap;}
.card-media:hover .size-row{opacity:1;transform:translateY(0);}
.size-pill{font-size:.7rem;font-weight:400;background:#fff;border:1px solid var(--ink);padding:.2rem .5rem;border-radius:2px;color:var(--ink);}
.size-pill:hover{background:var(--ink-solid);color:#fff;}
.card-info{padding:.75rem 0 1.6rem;}
.card-name{font-size:.75rem;font-weight:400;text-transform:uppercase;margin-bottom:.15rem;}
.card-color{font-size:.7rem;color:var(--muted);letter-spacing:normal;margin-bottom:.4rem;}
.card-price{font-size:.8rem;font-weight:500;display:flex;gap:.5rem;align-items:baseline;}
.price-was{color:var(--dim);text-decoration:line-through;font-weight:400;}
.price-sale{color:#b3261e;}
.no-results{padding:3rem 2rem;text-align:center;color:var(--muted);font-size:.85rem;display:none;}

/* LIST VIEW */
.product-grid.list-view{grid-template-columns:1fr;gap:1px;}
.product-grid.list-view .product-card{display:grid;grid-template-columns:160px 1fr;gap:1.2rem;padding:.8rem 0;align-items:center;border-bottom:1px solid var(--line);}
.product-grid.list-view .card-media{aspect-ratio:3/4;width:160px;}
.product-grid.list-view .card-info{padding:0;}

@media (max-width:820px){
  .product-grid{grid-template-columns:repeat(2,1fr);padding:1.4rem 1rem 0;}
  nav.site-nav{padding:0 1rem;}
  .page-head,.filter-bar{padding-left:1rem;padding-right:1rem;}
}

/* FOOTER */
footer{border-top:1px solid var(--line);padding:3rem 2rem;background:var(--grey);margin-top:2rem;}
.footer-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;flex-wrap:wrap;gap:2rem;}
.footer-brand{font-size:1.1rem;font-weight:700;letter-spacing:.03em;}
.footer-links{display:flex;gap:2.5rem;flex-wrap:wrap;}
.footer-col h4{font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.7rem;}
.footer-col a{display:block;font-size:.78rem;margin-bottom:.5rem;}
.footer-legal{margin-top:2.5rem;font-size:.68rem;color:var(--muted);text-align:center;}
</style>
</head>
<body>

<div class="promo-bar">FREE SHIPPING</div>

<nav class="site-nav">
  <div class="nav-left">
    <a href="#">Shop</a>
    <a href="#">Info</a>
  </div>
  <a href="#" class="nav-logo">CONSCIENT</a>
  <div class="nav-right">
    <span class="curr">USD <svg class="chev" viewBox="0 0 10 6" width="9" height="6"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    <span class="nav-icon" title="Search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <span class="nav-icon" title="Account"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg></span>
    <span class="nav-icon" id="bagIcon" title="Bag">
      <svg viewBox="0 0 24 24"><path d="M6 8h12l-1 13H7L6 8z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg>
      <span class="bag-count" id="bagCount">0</span>
    </span>
  </div>
</nav>

<div class="toast" id="toast">Added to bag</div>

<div class="page-head">
  <h1>ALL</h1>
</div>

<div class="filter-bar">
  <div class="filter-left" id="filterLeft">
    <!-- filter buttons injected by JS -->
  </div>
  <div class="filter-right">
    <span class="item-count" id="itemCount">— items</span>
    <div class="sort-wrap" style="position:relative;">
      <button class="filter-btn" id="sortBtn" type="button"><span>Sort</span><svg class="chev" viewBox="0 0 10 6" width="9" height="6"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <div class="filter-panel" id="sortPanel">
        <label><input type="radio" name="sortOpt" value="featured" checked> Featured</label>
        <label><input type="radio" name="sortOpt" value="popular"> Popular</label>
        <label><input type="radio" name="sortOpt" value="price-asc"> Price, low to high</label>
        <label><input type="radio" name="sortOpt" value="price-desc"> Price, high to low</label>
        <label><input type="radio" name="sortOpt" value="newest"> Latest / Newest</label>
      </div>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="gridViewBtn" title="Grid view">
        <svg viewBox="0 0 16 16"><rect x="0" y="0" width="7" height="7"/><rect x="9" y="0" width="7" height="7"/><rect x="0" y="9" width="7" height="7"/><rect x="9" y="9" width="7" height="7"/></svg>
      </button>
      <button class="view-btn" id="listViewBtn" title="List view">
        <svg viewBox="0 0 16 16"><circle cx="2" cy="2" r="1.6"/><rect x="6" y="1" width="10" height="2"/><circle cx="2" cy="8" r="1.6"/><rect x="6" y="7" width="10" height="2"/><circle cx="2" cy="14" r="1.6"/><rect x="6" y="13" width="10" height="2"/></svg>
      </button>
    </div>
    <span class="clear-all" id="clearAll">Clear all</span>
  </div>
</div>

<div class="product-grid" id="productGrid"></div>
<div class="no-results" id="noResults">No hoodies match those filters.</div>

<footer>
  <div class="footer-inner">
    <div class="footer-brand">CONSCIE<span style="color:#b3261e">NT</span></div>
    <div class="footer-links">
      <div class="footer-col">
        <h4>Shop</h4>
        <a href="#">Hoodies</a><a href="#">Outerwear</a><a href="#">Footwear</a><a href="#">Accessories</a>
      </div>
      <div class="footer-col">
        <h4>Brand</h4>
        <a href="#">About Conscient</a><a href="#">Lookbook</a><a href="#">Stockists</a>
      </div>
      <div class="footer-col">
        <h4>Help</h4>
        <a href="#">Shipping &amp; Returns</a><a href="#">Sizing</a><a href="#">Contact</a>
      </div>
    </div>
  </div>
  <div class="footer-legal">© 2026 Conscient. All rights reserved.</div>
</footer>

<script>
(function(){
  // ---- product data ----
  const PRODUCTS = [
    {id:1,  name:'CHROME ZIP HOODIE',     color:'VINTAGE BLACK',   type:'Tops', price:236, compareAt:null, tag:'New',  sizes:['XS','S','M','L','XL'], swA:'#2a2a2a', swB:'#111'},
    {id:2,  name:'CHROME ZIP HOODIE',     color:'OFF WHITE',       type:'Tops', price:236, compareAt:null, tag:null,   sizes:['XS','S','M','L','XL'], swA:'#efeae4', swB:'#d8d2ca'},
    {id:3,  name:'TOWELLING ZIP HOODIE',  color:'DARK NAVY',       type:'Tops', price:236, compareAt:null, tag:'New',  sizes:['S','M','L','XL'],      swA:'#20293a', swB:'#131a26'},
    {id:4,  name:'TOWELLING ZIP HOODIE',  color:'LIGHT GREY MARL', type:'Tops', price:236, compareAt:null, tag:null,   sizes:['XS','S','M','L','XL'], swA:'#d6d3cf', swB:'#b7b3ad'},
    {id:5,  name:'SPONSOR ZIP HOODIE',    color:'VINTAGE BLACK',   type:'Tops', price:236, compareAt:null, tag:'New',  sizes:['S','M','L','XL'],      swA:'#161616', swB:'#040404'},
    {id:6,  name:'SIGNATURE PULLOVER HOODIE', color:'CRIMSON',     type:'Tops', price:210, compareAt:260,  tag:'Sale', sizes:['XS','S','M','L','XL'], swA:'#8b0019', swB:'#c41230'},
    {id:7,  name:'ARCHIVE HOODIE',        color:'CHARCOAL',        type:'Tops', price:198, compareAt:null, tag:null,   sizes:['S','M','L','XL'],      swA:'#3a3a3a', swB:'#232323'},
    {id:8,  name:'STAR PATCH ZIP HOODIE', color:'WHITE',           type:'Tops', price:236, compareAt:null, tag:'New',  sizes:['XS','S','M','L'],      swA:'#f4f2ef', swB:'#e2ddd6'},
    {id:9,  name:'SCARLET WASH HOODIE',   color:'RED',             type:'Tops', price:215, compareAt:null, tag:null,   sizes:['S','M','L','XL'],      swA:'#a3182c', swB:'#7a0f1f'},
    {id:10, name:'94 BACKSTAGE HOODIE',   color:'LIGHT GREY MARL', type:'Tops', price:198, compareAt:null, tag:'New',  sizes:['XS','S','M','L','XL'], swA:'#d6d3cf', swB:'#b7b3ad'},
    {id:11, name:'FIELD RESEARCH HOODIE', color:'RED',             type:'Tops', price:198, compareAt:null, tag:null,   sizes:['S','M','L','XL'],      swA:'#a3182c', swB:'#7a0f1f'},
    {id:12, name:'LOVESICK HOODIE',       color:'NAVY',            type:'Tops', price:220, compareAt:null, tag:'New',  sizes:['XS','S','M','L','XL'], swA:'#20293a', swB:'#131a26'},
    {id:13, name:'MATADOR HOODIE',        color:'VINTAGE BLACK',   type:'Tops', price:198, compareAt:null, tag:null,   sizes:['S','M','L','XL'],      swA:'#161616', swB:'#040404'},
    {id:14, name:'ATHLETIC CLUB HOODIE',  color:'BLUE',            type:'Tops', price:198, compareAt:240,  tag:'Sale', sizes:['XS','S','M','L','XL'], swA:'#2d4d8b', swB:'#1c3363'},
    {id:15, name:'MICRO FLAG ZIP HOODIE', color:'VINTAGE BLACK',   type:'Tops', price:236, compareAt:null, tag:null,   sizes:['S','M','L','XL'],      swA:'#161616', swB:'#040404'},
    {id:16, name:'LOOP TAB HOODIE',       color:'LIGHT GREY MARL', type:'Tops', price:198, compareAt:null, tag:null,   sizes:['XS','S','M','L'],      swA:'#d6d3cf', swB:'#b7b3ad'}
  ];

  const SIZE_ORDER = ['XS','S','M','L','XL'];

  const state = {
    view: 'grid',
    sort: 'featured',
    filters: { size:new Set(), type:new Set(), color:new Set() }
  };

  // ---- build filter definitions from data ----
  function uniq(arr){ return [...new Set(arr)]; }
  const FILTERS = [
    { key:'size',   label:'Size',          options: SIZE_ORDER },
    { key:'type',   label:'Product type',  options: ['Tops','Bottoms','Accessories'] },
    { key:'color',  label:'Color',         options: uniq(PRODUCTS.map(p=>p.color)).sort() }
  ];

  const filterLeft = document.getElementById('filterLeft');
  FILTERS.forEach(f=>{
    const wrap = document.createElement('div');
    wrap.style.position='relative';
    const btn = document.createElement('button');
    btn.className='filter-btn';
    btn.innerHTML = `<span>${f.label}</span><svg class="chev" viewBox="0 0 10 6" width="9" height="6"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const panel = document.createElement('div');
    panel.className='filter-panel';
    panel.innerHTML = f.options.map(opt=>{
      const val = String(opt);
      return `<label><input type="checkbox" data-filter="${f.key}" value="${val}"> ${val}</label>`;
    }).join('') + `<span class="clear-link" data-clearfilter="${f.key}">Clear</span>`;
    btn.addEventListener('click',(e)=>{
      e.stopPropagation();
      const isOpen = panel.classList.contains('open');
      document.querySelectorAll('.filter-panel.open').forEach(p=>p.classList.remove('open'));
      document.querySelectorAll('.filter-btn.active').forEach(b=>b.classList.remove('active'));
      if(!isOpen){ panel.classList.add('open'); btn.classList.add('active'); }
    });
    panel.addEventListener('click', e=>e.stopPropagation());
    panel.addEventListener('change', e=>{
      if(e.target.matches('input[type="checkbox"]')){
        const val = e.target.value;
        if(e.target.checked) state.filters[f.key].add(val);
        else state.filters[f.key].delete(val);
        render();
      }
    });
    panel.querySelector('[data-clearfilter]').addEventListener('click', ()=>{
      state.filters[f.key].clear();
      panel.querySelectorAll('input[type="checkbox"]').forEach(cb=>cb.checked=false);
      render();
    });
    wrap.appendChild(btn);
    wrap.appendChild(panel);
    filterLeft.appendChild(wrap);
  });

  document.addEventListener('click', ()=>{
    document.querySelectorAll('.filter-panel.open').forEach(p=>p.classList.remove('open'));
    document.querySelectorAll('.filter-btn.active').forEach(b=>b.classList.remove('active'));
  });

  document.getElementById('clearAll').addEventListener('click', ()=>{
    Object.values(state.filters).forEach(s=>s.clear());
    document.querySelectorAll('.filter-panel input[type="checkbox"]').forEach(cb=>cb.checked=false);
    render();
  });

  // Sort dropdown (same open/close pattern as the other filter buttons)
  const sortBtn = document.getElementById('sortBtn');
  const sortPanel = document.getElementById('sortPanel');
  sortBtn.addEventListener('click', e=>{
    e.stopPropagation();
    const isOpen = sortPanel.classList.contains('open');
    document.querySelectorAll('.filter-panel.open').forEach(p=>p.classList.remove('open'));
    document.querySelectorAll('.filter-btn.active').forEach(b=>b.classList.remove('active'));
    if(!isOpen){ sortPanel.classList.add('open'); sortBtn.classList.add('active'); }
  });
  sortPanel.addEventListener('click', e=>e.stopPropagation());
  sortPanel.addEventListener('change', e=>{
    if(e.target.name==='sortOpt'){
      state.sort = e.target.value;
      sortPanel.classList.remove('open');
      sortBtn.classList.remove('active');
      render();
    }
  });

  const grid = document.getElementById('productGrid');
  const gridBtn = document.getElementById('gridViewBtn');
  const listBtn = document.getElementById('listViewBtn');
  gridBtn.addEventListener('click', ()=>{ state.view='grid'; grid.classList.remove('list-view'); gridBtn.classList.add('active'); listBtn.classList.remove('active'); });
  listBtn.addEventListener('click', ()=>{ state.view='list'; grid.classList.add('list-view'); listBtn.classList.add('active'); gridBtn.classList.remove('active'); });

  function initials(name){
    return name.split(' ').filter(w=>w.length>2 || /[0-9]/.test(w)).slice(0,2).map(w=>w[0]).join('').toUpperCase() || name.slice(0,2).toUpperCase();
  }

  function matches(p){
    const f = state.filters;
    if(f.size.size && !p.sizes.some(s=>f.size.has(s))) return false;
    if(f.type.size && !f.type.has(p.type)) return false;
    if(f.color.size && !f.color.has(p.color)) return false;
    return true;
  }

  function sortList(list){
    const l = list.slice();
    if(state.sort==='price-asc') l.sort((a,b)=>a.price-b.price);
    else if(state.sort==='price-desc') l.sort((a,b)=>b.price-a.price);
    else if(state.sort==='newest') l.sort((a,b)=> (b.tag==='New'?1:0)-(a.tag==='New'?1:0));
    else if(state.sort==='popular') l.sort((a,b)=>b.price-a.price);
    return l;
  }

  function cardHTML(p){
    const badge = p.tag ? `<span class="badge ${p.tag==='Sale'?'sale':''}">${p.tag}</span>` : '';
    const priceHTML = p.compareAt
      ? `<span class="price-sale">$${p.price}</span><span class="price-was">$${p.compareAt}</span>`
      : `<span>$${p.price}</span>`;
    const sizePills = p.sizes.map(s=>`<span class="size-pill" data-add data-id="${p.id}" data-size="${s}">${s}</span>`).join('');
    return `
    <div class="product-card">
      <div class="card-media">
        ${badge}
        <span class="quick-add" data-add data-id="${p.id}" data-size="${p.sizes[0]}">Add</span>
        <div class="media-layer base" style="background:linear-gradient(160deg, ${p.swA} 0%, ${p.swB} 100%)"><span class="media-mono" style="color:rgba(255,255,255,.35)">${initials(p.name)}</span></div>
        <div class="media-layer alt" style="background:linear-gradient(20deg, ${p.swB} 0%, ${p.swA} 100%)"><span class="media-mono" style="color:rgba(255,255,255,.5)">${initials(p.name)}</span></div>
        <div class="size-row">${sizePills}</div>
      </div>
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        <div class="card-color">${p.color}</div>
        <div class="card-price">${priceHTML}</div>
      </div>
    </div>`;
  }

  function render(){
    const filtered = PRODUCTS.filter(matches);
    const sorted = sortList(filtered);
    grid.innerHTML = sorted.map(cardHTML).join('');
    document.getElementById('itemCount').textContent = sorted.length + (sorted.length===1?' item':' items');
    document.getElementById('noResults').style.display = sorted.length ? 'none' : 'block';
    grid.style.display = sorted.length ? 'grid' : 'none';
  }

  // ---- cart / add to bag ----
  let cart = 0;
  const bagCount = document.getElementById('bagCount');
  const toast = document.getElementById('toast');
  let toastTimer;
  grid.addEventListener('click', e=>{
    const el = e.target.closest('[data-add]');
    if(!el) return;
    cart += 1;
    bagCount.textContent = cart;
    toast.textContent = `Added — Size ${el.dataset.size}`;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>toast.classList.remove('show'), 1600);
  });

  render();
})();
</script>
</body>
</html>
